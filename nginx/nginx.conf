events {}

http {
    server {
        listen 80;
        server_name patty-server.ddns.net;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name patty-server.ddns.net;

        ssl_certificate /etc/letsencrypt/live/patty-server.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/patty-server.ddns.net/privkey.pem;

        location / {
            proxy_pass http://app:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}