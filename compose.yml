services:
  astro-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: astro-photo-blog-dev
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true
    profiles: ["dev"]

  astro-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: astro-photo-blog-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    profiles: ["prod"]