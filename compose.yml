services:
  astro-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: astro-photo-blog-dev
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true

  astro-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: astro-photo-blog-prod
    ports:
      - "8080:80"